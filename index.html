<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    if (!localStorage.getItem('jesha_token') || !localStorage.getItem('jesha_usuario')) {
      window.location.replace('login.html')
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JESHA POS - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body data-page="dashboard">
<div class="app-shell">

  <div id="sidebar-container"></div>

  <main class="content">
    <header class="content-header">
      <h2>Dashboard</h2>
      <p id="fecha-actual"></p>
    </header>

    <section class="kpi-grid" aria-label="Indicadores">

      <article class="kpi-card">
        <div class="kpi-icon blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b9de8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="kpi-label">Ventas Hoy</div>
        <div class="kpi-value">$0.00</div>
        <div class="kpi-sub">0 transacciones</div>
      </article>

      <article class="kpi-card">
        <div class="kpi-icon indigo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8899cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
          </svg>
        </div>
        <div class="kpi-label">Total Ventas</div>
        <div class="kpi-value">$0.00</div>
        <div class="kpi-sub">0 ventas totales</div>
      </article>

      <article class="kpi-card">
        <div class="kpi-icon gray">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa5b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </div>
        <div class="kpi-label">Productos</div>
        <div class="kpi-value">0</div>
        <div class="kpi-sub">0 unidades en stock</div>
      </article>

      <article class="kpi-card">
        <div class="kpi-icon orange">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8710a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="kpi-label">Stock Bajo</div>
        <div class="kpi-value">0</div>
        <div class="kpi-sub">Requieren reposición</div>
      </article>

    </section>

    <section class="panel-grid" aria-label="Paneles">

      <article class="panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <h3>Ventas Recientes</h3>
        </div>
        <div class="panel-empty">No hay ventas registradas</div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8710a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <h3>Productos con Stock Bajo</h3>
        </div>
        <div class="panel-empty">Todos los productos tienen stock suficiente</div>
      </article>

    </section>
  </main>

</div>

<script src="config.js"></script>
  <script src="sidebar.js"></script>

<script src="dashboard.js"></script>

<script>
  // Inicializar fecha actual
  const fecha = new Date();
  const elFecha = document.getElementById('fecha-actual');
  if (elFecha) {
    elFecha.textContent = fecha.toLocaleDateString('es-MX', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }
</script>
</body>
</html>
