  <!-- ── CONTENIDO ── -->
  <main class="content">
    <header class="content-header">
      <h2>Inventario</h2>
      <p id="fecha-actual"></p>
    </header>

    <!-- ── BUSCADOR Y BOTÓN ── -->
    <section class="toolbar">
      <div class="search-group">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Buscar productos..." 
          class="search-input"
        />
      </div>

      <button id="btn-nuevo-producto" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Agregar Producto
      </button>
    </section>

    <!-- ── TABLA DE PRODUCTOS ── -->
    <section class="panel">
      <div class="table-wrapper">
        <table class="productos-table">
          <thead>
            <tr>
              <th>CÓDIGO</th>
              <th>PRODUCTO</th>
              <th>CATEGORÍA</th>
              <th>PRECIO</th>
              <th>STOCK</th>
              <th>MÍN STOCK</th>
              <th>ESTADO</th>
              <th>ACCIONES</th>
            </tr>
          </thead>
          <tbody id="productos-tbody">
            <tr class="loading-row">
              <td colspan="8" style="text-align: center; padding: 40px;">
                <div class="spinner"></div>
                <p style="margin-top: 12px; color: var(--muted);">Cargando productos...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<!-- ── MODAL CREAR/EDITAR PRODUCTO ── -->
<div id="modal-producto" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title">Nuevo Producto</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>

    <form id="producto-form">
      <!-- Nombre y Código -->
      <div class="form-row">
        <div class="form-group">
          <label for="producto-nombre">Nombre *</label>
          <input type="text" id="producto-nombre" placeholder="Nombre del producto" required />
        </div>
        <div class="form-group">
          <label for="producto-codigo">Código Interno *</label>
          <input type="text" id="producto-codigo" placeholder="ej: HER-001" required />
        </div>
      </div>

      <!-- Código de barras -->
      <div class="form-group full-width">
        <label for="producto-codigoBarras">Código de Barras</label>
        <input type="text" id="producto-codigoBarras" placeholder="Código de barras (opcional)" />
      </div>

      <!-- Categoría y Departamento -->
      <div class="form-row">
        <div class="form-group">
          <label for="producto-departamento">Departamento</label>
          <select id="producto-departamento">
            <option value="">Seleccionar departamento...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="producto-categoria">Categoría *</label>
          <select id="producto-categoria" required>
            <option value="">Seleccionar categoría...</option>
          </select>
        </div>
      </div>

      <!-- Descripción -->
      <div class="form-group full-width">
        <label for="producto-descripcion">Descripción</label>
        <textarea id="producto-descripcion" rows="3" placeholder="Descripción del producto..."></textarea>
      </div>

      <!-- IMAGEN (NUEVO) -->
      <div class="form-group full-width">
        <label for="producto-imagen">Imagen del Producto</label>
        <input type="file" id="producto-imagen" accept="image/*" />
        <div id="imagen-preview-container" style="display: none; margin-top: 12px;">
          <img id="imagen-preview" style="max-width: 200px; border-radius: 8px;" />
          <button type="button" id="btn-cambiar-preview" class="btn-secondary" style="margin-top: 8px; display: block;">
            Cambiar imagen
          </button>
        </div>
      </div>

      <!-- Precios -->
      <div class="form-row">
        <div class="form-group">
          <label for="producto-costo">Costo</label>
          <input type="number" id="producto-costo" step="0.01" min="0" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label for="producto-precioBase">Precio Venta *</label>
          <input type="number" id="producto-precioBase" step="0.01" min="0" placeholder="0.00" required />
        </div>
      </div>

      <!-- Margen (información) -->
      <div class="form-group full-width">
        <div class="info-margen" id="info-margen" style="display: none;">
          <span>Margen: <strong id="margen-valor">0%</strong></span>
        </div>
      </div>

      <!-- Unidades de medida -->
      <div class="form-row">
        <div class="form-group">
          <label for="producto-unidadCompra">Unidad Compra</label>
          <input type="text" id="producto-unidadCompra" placeholder="ej: caja" />
        </div>
        <div class="form-group">
          <label for="producto-unidadVenta">Unidad Venta</label>
          <input type="text" id="producto-unidadVenta" placeholder="ej: pza" />
        </div>
        <div class="form-group">
          <label for="producto-factorConversion">Factor Conversión</label>
          <input type="number" id="producto-factorConversion" step="0.01" placeholder="ej: 12" />
        </div>
      </div>

      <!-- Claves SAT -->
      <div class="form-row">
        <div class="form-group">
          <label for="producto-claveSat">Clave SAT</label>
          <input type="text" id="producto-claveSat" placeholder="8 dígitos" maxlength="8" />
        </div>
        <div class="form-group">
          <label for="producto-unidadSat">Unidad SAT</label>
          <input type="text" id="producto-unidadSat" placeholder="ej: H87" />
        </div>
      </div>

      <!-- Error message -->
      <div id="producto-error" class="error-message"></div>

      <!-- Botones -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar Producto</button>
      </div>
    </form>
  </div>
</div>

<script src="productos.js"></script>
</body>
