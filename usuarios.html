<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JESHA POS - Usuarios</title>
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; }
    .page-title { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; margin:0; }
    .page-sub { color:var(--muted); font-size:0.85rem; margin-top:4px; }
    .btn-primary { display:flex; align-items:center; gap:6px; padding:9px 16px; background:#1f3a66; border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-family:'Barlow',sans-serif; font-size:0.875rem; font-weight:600; cursor:pointer; transition:background 0.15s; white-space:nowrap; }
    .btn-primary:hover { background:#243f72; }
    .toolbar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .search-wrap { flex:1; min-width:200px; position:relative; }
    .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
    .search-input { width:100%; padding:9px 12px 9px 36px; background:var(--panel); border:1px solid var(--panel-border); border-radius:8px; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.875rem; outline:none; }
    .search-input::placeholder { color:var(--muted); }
    .filter-select { padding:9px 12px; background:var(--panel); border:1px solid var(--panel-border); border-radius:8px; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.875rem; outline:none; cursor:pointer; }
    .filter-select option { background:#1a1d23; }
    .table-wrap { background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:11px 16px; text-align:left; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); border-bottom:1px solid var(--panel-border); }
    tbody tr { border-bottom:1px solid var(--panel-border); transition:background 0.1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,0.02); }
    tbody td { padding:12px 16px; font-size:0.875rem; }
    .user-name { font-weight:600; }
    .user-username { color:var(--muted); font-size:0.8rem; margin-top:2px; }
    .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:0.73rem; font-weight:600; letter-spacing:0.03em; }
    .badge-superadmin { background:rgba(100,50,180,0.25); color:#b070f0; border:1px solid rgba(100,50,180,0.3); }
    .badge-admin { background:rgba(200,160,0,0.2); color:#e0c050; border:1px solid rgba(200,160,0,0.3); }
    .badge-vendedor { background:rgba(30,120,60,0.25); color:#60d080; border:1px solid rgba(30,120,60,0.3); }
    .toggle-wrap { display:flex; align-items:center; gap:8px; }
    .toggle { position:relative; width:36px; height:20px; background:rgba(255,255,255,0.1); border-radius:10px; cursor:pointer; transition:background 0.2s; border:none; padding:0; flex-shrink:0; }
    .toggle.on { background:#2a7a3a; }
    .toggle::after { content:''; position:absolute; top:3px; left:3px; width:14px; height:14px; background:#fff; border-radius:50%; transition:transform 0.2s; }
    .toggle.on::after { transform:translateX(16px); }
    .toggle-label { font-size:0.8rem; color:var(--muted); }
    .toggle-label.on { color:#60d080; }
    .login-time { font-size:0.8rem; color:var(--muted); }
    .login-never { font-size:0.8rem; color:rgba(255,255,255,0.2); font-style:italic; }
    .actions { display:flex; gap:5px; }
    .btn-icon { width:30px; height:30px; display:grid; place-items:center; border-radius:6px; border:1px solid var(--panel-border); background:transparent; color:var(--muted); cursor:pointer; transition:background 0.15s,color 0.15s; }
    .btn-icon:hover { background:rgba(255,255,255,0.06); color:var(--text); }
    .btn-icon.warning:hover { background:rgba(200,150,0,0.15); color:#e0b040; border-color:rgba(200,150,0,0.3); }
    .empty-state { padding:48px; text-align:center; color:var(--muted); font-size:0.875rem; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:100; place-items:center; }
    .modal-overlay.open { display:grid; }
    .modal { background:#13161c; border:1px solid var(--panel-border); border-radius:14px; padding:28px; width:100%; max-width:500px; box-shadow:0 24px 60px rgba(0,0,0,0.6); max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
    .modal-header h3 { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; margin:0; }
    .btn-close { background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; border-radius:4px; }
    .btn-close:hover { color:var(--text); }
    .meta-info { background:rgba(255,255,255,0.03); border:1px solid var(--panel-border); border-radius:8px; padding:12px 14px; margin-bottom:18px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .meta-item label { display:block; font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:2px; }
    .meta-item span { font-size:0.85rem; color:var(--text); }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
    .form-group input,.form-group select { width:100%; padding:10px 12px; background:rgba(255,255,255,0.05); border:1px solid var(--panel-border); border-radius:8px; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.9rem; outline:none; box-sizing:border-box; }
    .form-group input:focus,.form-group select:focus { border-color:rgba(255,255,255,0.25); }
    .form-group input::placeholder { color:rgba(255,255,255,0.25); }
    .form-group select option { background:#1a1d23; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pass-wrap { position:relative; }
    .pass-wrap input { padding-right:42px; }
    .btn-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.35); display:flex; align-items:center; padding:4px; }
    .btn-eye:hover { color:rgba(255,255,255,0.7); }
    .divider { border:none; border-top:1px solid var(--panel-border); margin:18px 0; }
    .section-title { font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:12px; }
    .modal-footer { display:flex; gap:10px; margin-top:20px; }
    .btn-secondary { flex:1; padding:10px; background:transparent; border:1px solid var(--panel-border); border-radius:8px; color:var(--muted); font-family:'Barlow',sans-serif; font-size:0.875rem; cursor:pointer; }
    .btn-secondary:hover { background:rgba(255,255,255,0.04); }
    .btn-submit { flex:2; padding:10px; background:#fff; border:none; border-radius:8px; color:#000; font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; }
    .btn-submit:hover { background:#e0e0e0; }
    .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
    .msg-error { color:#e07070; font-size:0.82rem; margin-top:10px; text-align:center; min-height:18px; }
    .msg-ok { color:#6fcf6f; font-size:0.82rem; margin-top:10px; text-align:center; min-height:18px; }
    .hint { font-size:0.76rem; color:var(--muted); margin-top:3px; }
  </style>
</head>
<body data-page="usuarios">
<div class="app-shell">

  <!-- ✅ SIDEBAR COMPONENTE GLOBAL -->
  <div id="sidebar-container"></div>

  <main class="content">
    <div class="page-header">
      <div>
        <h2 class="page-title">Usuarios</h2>
        <p class="page-sub" id="total-usuarios">Cargando usuarios...</p>
      </div>
      <button class="btn-primary" id="btn-nuevo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuevo Usuario
      </button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="buscar" class="search-input" placeholder="Buscar usuario...">
      </div>
      <select id="filtro-rol" class="filter-select">
        <option value="">Todos los roles</option>
        <option value="SUPERADMIN">Superadmin</option>
        <option value="ADMIN_SUCURSAL">Admin Sucursal</option>
        <option value="EMPLEADO">Empleado</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Último Login</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr>
            <td colspan="6" class="empty-state">Cargando usuarios...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

</div>

<!-- ── MODAL USUARIO (CREAR O EDITAR) ── -->
<div id="modal-usuario" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Nuevo Usuario</h3>
      <button class="btn-close" id="btn-cerrar-modal">&times;</button>
    </div>

    <div id="meta-info" class="meta-info" style="display:none;">
      <div class="meta-item">
        <label>ID</label>
        <span id="meta-id">-</span>
      </div>
      <div class="meta-item">
        <label>Creado</label>
        <span id="meta-creado">-</span>
      </div>
      <div class="meta-item">
        <label>Último Login</label>
        <span id="meta-login">-</span>
      </div>
      <div class="meta-item">
        <label>Ventas</label>
        <span id="meta-ventas">-</span>
      </div>
    </div>

    <form id="form-usuario">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="f-nombre" placeholder="Juan Pérez" required>
      </div>

      <div class="form-group">
        <label>Usuario *</label>
        <input type="text" id="f-username" placeholder="jperez" required>
      </div>

      <div class="form-group">
        <label>Rol *</label>
        <select id="f-rol" required>
          <option value="">Seleccionar rol...</option>
          <option value="SUPERADMIN" class="opt-superadmin">Superadmin</option>
          <option value="ADMIN_SUCURSAL">Admin Sucursal</option>
          <option value="EMPLEADO">Empleado</option>
        </select>
      </div>

      <div class="form-group">
        <label>Sucursal</label>
        <select id="f-sucursal">
          <option value="">Seleccionar sucursal...</option>
        </select>
      </div>

      <div class="divider"></div>
      <h4 class="section-title" id="titulo-pass">Nueva Contraseña *</h4>

      <div class="form-group">
        <label id="label-pass">Contraseña *</label>
        <div class="pass-wrap">
          <input type="password" id="f-password" placeholder="••••••" required>
          <button type="button" class="btn-eye" onclick="togglePassword()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="hint" id="hint-pass">Mínimo 6 caracteres</div>
      </div>

      <div class="form-group">
        <label>Confirmar Contraseña *</label>
        <input type="password" id="f-confirmar" placeholder="••••••" required>
      </div>

      <div class="msg-error" id="msg-usuario"></div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="btn-cerrar">Cancelar</button>
        <button type="button" class="btn-submit" id="btn-guardar">Crear Usuario</button>
      </div>
    </form>
  </div>
</div>

<!-- ── MODAL RESET PASSWORD ── -->
<div id="modal-reset" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Resetear Contraseña</h3>
      <button class="btn-close" id="btn-cerrar-reset">&times;</button>
    </div>
    <p style="color:var(--muted); margin-bottom:18px;">
      Usuario: <strong id="reset-nombre">-</strong>
    </p>
    <div class="form-group">
      <label>Nueva Contraseña *</label>
      <input type="password" id="r-password" placeholder="••••••" required>
    </div>
    <div class="form-group">
      <label>Confirmar *</label>
      <input type="password" id="r-confirmar" placeholder="••••••" required>
    </div>
    <div class="msg-error" id="msg-reset"></div>
    <div class="modal-footer">
      <button type="button" class="btn-secondary" id="btn-cerrar-reset-modal">Cancelar</button>
      <button type="button" class="btn-submit" id="btn-reset-guardar">Actualizar Contraseña</button>
    </div>
  </div>
</div>

<!-- ===== SCRIPTS ===== -->
<!-- ORDEN CORRECTO: sidebar.js PRIMERO (maneja autenticación + sidebar) -->
<script src="sidebar.js"></script>

<!-- Luego: usuarios.js (lógica de la página) -->
<script src="usuarios.js"></script>

<!-- NOTA: NO llamar cargarSidebar() aquí -->
<!-- sidebar.js ya lo hace automáticamente en su DOMContentLoaded -->
<!-- El data-page="usuarios" en <body> le dice qué página resaltar -->

</body>
</html>
