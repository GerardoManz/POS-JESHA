<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    if (!localStorage.getItem('jesha_token') || !localStorage.getItem('jesha_usuario')) {
      window.location.replace('login.html')
    }
  </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importación de Productos - JESHA POS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }

        .content { padding: 40px 30px; }

        .form-group { margin-bottom: 30px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        #csvFile { display: none; }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-input-label:hover { background: #f0f2ff; border-color: #764ba2; }
        .file-input-label span { text-align: center; }
        .file-name { font-weight: 600; color: #333; display: block; }
        .file-hint { font-size: 0.9em; color: #999; display: block; margin-top: 5px; }

        .buttons-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-validate { background: #667eea; color: white; }
        .btn-validate:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-import { background: #48bb78; color: white; }
        .btn-import:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #result { margin-top: 30px; border-radius: 8px; }

        .error-box {
            background: #fed7d7;
            border-left: 4px solid #fc8181;
            color: #742a2a;
            padding: 15px;
            border-radius: 4px;
        }
        .exito-box {
            background: #c6f6d5;
            border-left: 4px solid #68d391;
            color: #22543d;
            padding: 15px;
            border-radius: 4px;
            font-weight: 600;
            white-space: pre-line;
        }
        .info-box {
            background: #e6fffa;
            border-left: 4px solid #38b2ac;
            color: #234e52;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .buttons-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Importación de Productos</h1>
            <p>Sistema JESHA POS - Ferretería</p>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>ℹ️ Información:</strong>
                <p>Sube un CSV con columnas: CLAVE, CLAVE ALTERNA, DESCRIPCION, PRECIO COMPRA, PRECIO 1, DEPARTAMENTO, CATEGORIA, CLAVE SAT, UNIDAD SAT</p>
                <p style="margin-top: 5px; font-size: 0.9em;">El sistema detecta automáticamente notación científica, duplicados y datos faltantes.</p>
            </div>

            <div class="form-group">
                <label>Seleccionar archivo CSV</label>
                <div>
                    <input type="file" id="csvFile" accept=".csv" />
                    <label for="csvFile" class="file-input-label">
                        <span>
                            <span class="file-name">📁 Haz clic o arrastra aquí</span>
                            <span class="file-hint">Archivos .csv (máx 50 MB)</span>
                        </span>
                    </label>
                </div>
            </div>

            <div class="buttons-group">
                <button class="btn btn-validate" id="validateBtn">✓ Validar Archivo</button>
                <button class="btn btn-import" id="importBtn" disabled>🚀 Importar Productos</button>
            </div>

            <div id="result"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="importacion.js"></script>
</body>
</html>
