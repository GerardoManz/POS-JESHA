<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    if (!localStorage.getItem('jesha_token') || !localStorage.getItem('jesha_usuario')) {
      window.location.replace('login.html')
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JESHA POS - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    /* ── Selector de sucursal (SUPERADMIN) ── */
    .sucursal-filter-wrap { display:flex; align-items:center; gap:10px; margin-left:auto; }
    .sucursal-filter-wrap label { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
    .sucursal-filter-select {
      padding:8px 14px;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--panel-border);
      border-radius:8px;
      color:var(--text);
      font-family:'Barlow',sans-serif;
      font-size:0.875rem;
      cursor:pointer;
      min-width:200px;
    }

    /* ── KPI grid: 5 columnas ── */
    .kpi-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; margin-bottom:18px; }
    @media (max-width: 1100px) { .kpi-grid { grid-template-columns:repeat(3, 1fr); } }
    @media (max-width: 700px)  { .kpi-grid { grid-template-columns:repeat(2, 1fr); } }

    /* ── Acentos por categoría de inventario ── */
    .kpi-card.kpi-con-stock  { border-color:rgba(96,208,128,0.25); }
    .kpi-card.kpi-stock-bajo { border-color:rgba(232,113,10,0.30); }
    .kpi-card.kpi-sin-stock  { border-color:rgba(255,107,107,0.30); }

    .kpi-card.kpi-con-stock  .kpi-value { color:#60d080; }
    .kpi-card.kpi-stock-bajo .kpi-value { color:#e8710a; }
    .kpi-card.kpi-sin-stock  .kpi-value { color:#ff6b6b; }
  </style>
</head>
<body data-page="dashboard">
<div class="app-shell">

  <div id="sidebar-container"></div>

  <main class="content">
    <header class="content-header" style="display:flex;align-items:flex-end;flex-wrap:wrap;gap:12px;">
      <div>
        <h2>Dashboard</h2>
        <p id="fecha-actual"></p>
      </div>

      <!-- Selector de sucursal (solo visible para SUPERADMIN) -->
      <div id="sucursal-filter" class="sucursal-filter-wrap" style="display:none;">
        <label for="filtro-sucursal">Sucursal:</label>
        <select id="filtro-sucursal" class="sucursal-filter-select">
          <option value="">🏢 Todas las sucursales</option>
        </select>
      </div>
    </header>

    <section class="kpi-grid" aria-label="Indicadores">

      <article class="kpi-card" id="kpi-ventas-hoy">
        <div class="kpi-icon blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b9de8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="kpi-label">Ventas Hoy</div>
        <div class="kpi-value">$0.00</div>
        <div class="kpi-sub">0 transacciones</div>
      </article>

      <article class="kpi-card" id="kpi-total-ventas">
        <div class="kpi-icon indigo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8899cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
          </svg>
        </div>
        <div class="kpi-label">Total Ventas</div>
        <div class="kpi-value">$0.00</div>
        <div class="kpi-sub">0 ventas totales</div>
      </article>

      <article class="kpi-card kpi-con-stock" id="kpi-con-stock">
        <div class="kpi-icon" style="background:rgba(96,208,128,0.15);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60d080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="kpi-label">Con Stock</div>
        <div class="kpi-value">0</div>
        <div class="kpi-sub">de 0 productos</div>
      </article>

      <article class="kpi-card kpi-stock-bajo" id="kpi-stock-bajo">
        <div class="kpi-icon orange">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8710a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="kpi-label">Stock Bajo</div>
        <div class="kpi-value">0</div>
        <div class="kpi-sub">Requieren reposición</div>
      </article>

      <article class="kpi-card kpi-sin-stock" id="kpi-sin-stock">
        <div class="kpi-icon" style="background:rgba(255,107,107,0.15);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <div class="kpi-label">Sin Stock</div>
        <div class="kpi-value">0</div>
        <div class="kpi-sub">Agotados</div>
      </article>

    </section>

    <section class="panel-grid" aria-label="Paneles">

      <article class="panel" id="panel-ventas">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <h3>Ventas Recientes</h3>
        </div>
        <div class="panel-empty">No hay ventas registradas</div>
      </article>

      <article class="panel" id="panel-stock">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8710a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <h3>Productos Críticos</h3>
        </div>
        <div class="panel-empty">Todos los productos tienen stock suficiente</div>
      </article>

    </section>
  </main>

</div>

<script src="config.js"></script>
<script src="sidebar.js"></script>
<script src="dashboard.js"></script>

<script>
  const fecha = new Date();
  const elFecha = document.getElementById('fecha-actual');
  if (elFecha) {
    elFecha.textContent = fecha.toLocaleDateString('es-MX', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }
</script>
</body>
</html>
