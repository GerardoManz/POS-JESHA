<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JESHA – Inicio de Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #1a2f5e;
      --navy2: #243d7a;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d8dce6;
      font-family: 'Barlow', sans-serif;
    }

    .card {
      display: flex;
      width: 860px;
      min-height: 520px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.22);
    }

    /* ── LEFT → NEGRO CLARO ── */
    .left {
      flex: 1;
      padding: 48px 52px 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #1a1a1a;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }

    .logo-wrap img {
      max-width: 220px;
      height: auto;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0 16px;
      margin-bottom: 14px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: border-color .2s, background .2s;
    }

    .field:focus-within {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.15);
    }

    .field svg {
      flex-shrink: 0;
      color: rgba(255,255,255,0.6);
    }

    .field input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 0;
      font-size: .95rem;
      font-family: 'Barlow', sans-serif;
      color: #fff;
      outline: none;
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .btn-login:hover  { background: #e0e0e0; }
    .btn-login:active { transform: scale(.98); }

    /* ── RIGHT → GRIS ── */
    .right {
      width: 320px;
      flex-shrink: 0;
      overflow: hidden;
      background: #b7b7b7;
    }

    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="left">
    <div class="logo-wrap">
      <img src="Imagenes/logo-jesha.png" alt="Ferretería e Iluminación JESHA" />
    </div>

    <div style="margin-top: -90px;">
      <h1>Inicio de Sesión</h1>

      <div class="field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" placeholder="Usuario" autocomplete="username" />
      </div>

      <div class="field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" placeholder="Contraseña" autocomplete="current-password" />
      </div>

      <button class="btn-login">Ingresar</button>
    </div>
  </div>

  <div class="right">
    <img src="Imagenes/panel-derecho.png" alt="" role="presentation" />
  </div>

</div>

</body>
</html>
