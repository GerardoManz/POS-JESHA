<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    if (!localStorage.getItem('jesha_token') || !localStorage.getItem('jesha_usuario')) {
      window.location.replace('login.html')
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JESHA POS - Reportes</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="reportes.css" />
</head>
<body data-page="reportes">
<div class="app-shell">
  <div id="sidebar-container"></div>
  <main class="content">
    <header class="content-header">
      <h2>Reportes</h2>
      <p id="fecha-actual"></p>
    </header>

    <!-- Selector de período -->
    <section class="rep-toolbar">
      <div class="rep-periodo">
        <button class="btn-periodo active" data-periodo="hoy">Hoy</button>
        <button class="btn-periodo" data-periodo="semana">Esta semana</button>
        <button class="btn-periodo" data-periodo="mes">Este mes</button>
        <button class="btn-periodo" data-periodo="custom">Personalizado</button>
      </div>
      <div class="rep-custom" id="rep-custom" style="display:none;">
        <div style="display:flex;flex-direction:column;gap:2px;">
          <label class="filter-date-label">Desde</label>
          <input type="date" id="rep-desde" class="filter-date" />
        </div>
        <div style="display:flex;flex-direction:column;gap:2px;">
          <label class="filter-date-label">Hasta</label>
          <input type="date" id="rep-hasta" class="filter-date" />
        </div>
        <button class="btn-primary btn-sm" id="btn-aplicar">Aplicar</button>
      </div>
    </section>

    <!-- KPIs principales -->
    <section class="kpi-grid" id="rep-kpis">
      <article class="kpi-card">
        <div class="kpi-icon blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b9de8" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <div class="kpi-label">Ingresos</div>
        <div class="kpi-value" id="kpi-ingresos">$0.00</div>
        <div class="kpi-sub" id="kpi-ingresos-sub">0 ventas</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-icon indigo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8899cc" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
        <div class="kpi-label">Ticket Promedio</div>
        <div class="kpi-value" id="kpi-ticket">$0.00</div>
        <div class="kpi-sub">por venta</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-icon gray"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa5b8" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
        <div class="kpi-label">Efectivo</div>
        <div class="kpi-value" id="kpi-efectivo">$0.00</div>
        <div class="kpi-sub" id="kpi-efectivo-sub">0 ventas</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-icon orange"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8710a" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
        <div class="kpi-label">Tarjeta / Transf.</div>
        <div class="kpi-value" id="kpi-tarjeta">$0.00</div>
        <div class="kpi-sub" id="kpi-tarjeta-sub">0 ventas</div>
      </article>
    </section>

    <!-- Paneles de detalle -->
    <section class="panel-grid">

      <!-- Ventas por método de pago -->
      <article class="panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <h3>Ventas por Método de Pago</h3>
        </div>
        <div id="rep-metodos" class="panel-empty">Cargando...</div>
      </article>

      <!-- Top productos más vendidos -->
      <article class="panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <h3>Productos más vendidos</h3>
        </div>
        <div id="rep-productos" class="panel-empty">Cargando...</div>
      </article>

    </section>

    <section class="panel-grid" style="margin-top:14px;">

      <!-- Ventas por día -->
      <article class="panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <h3>Ventas por día</h3>
        </div>
        <div id="rep-por-dia" class="panel-empty">Cargando...</div>
      </article>

      <!-- Top clientes -->
      <article class="panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <h3>Top Clientes</h3>
        </div>
        <div id="rep-clientes" class="panel-empty">Cargando...</div>
      </article>

    </section>

  </main>
</div>
<script src="config.js"></script>
  <script src="sidebar.js"></script>
<script src="reportes.js"></script>
</body>
</html>
