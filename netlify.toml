# ════════════════════════════════════════════════════════════════════
#  JESHA POS — Configuración de Netlify para el frontend
#  Coloca este archivo en la raíz de Ferreteria JESHA/
# ════════════════════════════════════════════════════════════════════

[build]
  # No hay paso de build — son archivos estáticos
  publish = "."

  # Ignorar la carpeta del backend al deployar frontend
  ignore = "jesha-pos-backend"

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
