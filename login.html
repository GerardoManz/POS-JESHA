<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JESHA – Inicio de Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="card">

  <div class="left">
    <div class="logo-wrap">
      <img src="Imagenes/logo-jesha.png" alt="Ferretería e Iluminación JESHA" />
    </div>

    <div class="form-block">
      <h1>Inicio de Sesión</h1>

      <div class="field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" placeholder="Usuario" autocomplete="username" />
      </div>

      <div class="field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" placeholder="Contraseña" autocomplete="current-password" />
      </div>

      <button class="btn-login">Ingresar</button>
    </div>
  </div>

  <div class="right">
    <img src="Imagenes/panel-derecho.png" alt="" role="presentation" />
  </div>

</div>

</body>
</html>
