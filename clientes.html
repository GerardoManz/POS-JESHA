<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JESHA POS - Clientes</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="clientes.css" />
</head>
<body data-page="clientes">
<div class="app-shell">

  <!-- ✅ SIDEBAR COMPONENTE GLOBAL -->
  <div id="sidebar-container"></div>

  <!-- ── CONTENIDO ── -->
  <main class="content">
    <header class="content-header">
      <h2>Clientes</h2>
      <p id="fecha-actual"></p>
    </header>

    <!-- ── BUSCADOR Y BOTÓN ── -->
    <section class="toolbar">
      <div class="search-group">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Buscar por nombre, RFC o teléfono..." 
          class="search-input"
        />
      </div>

      <button id="btn-nuevo-cliente" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Agregar Cliente
      </button>
    </section>

    <!-- ── TABLA DE CLIENTES ── -->
    <section class="panel">
      <div class="table-wrapper">
        <table class="clientes-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>RFC</th>
              <th>Contacto</th>
              <th>Tipo</th>
              <th>Crédito</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="clientes-tbody">
            <tr class="loading-row">
              <td colspan="7" style="text-align: center; padding: 40px;">
                <div class="spinner"></div>
                <p style="margin-top: 12px; color: var(--muted);">Cargando clientes...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<!-- ── MODAL CREAR/EDITAR CLIENTE ── -->
<div id="modal-cliente" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title">Nuevo Cliente</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>

    <form id="cliente-form">
      <!-- Nombre y Apodo -->
      <div class="form-row">
        <div class="form-group">
          <label for="cliente-nombre">Nombre o Razón Social *</label>
          <input type="text" id="cliente-nombre" placeholder="Nombre del cliente" required />
        </div>
        <div class="form-group">
          <label for="cliente-apodo">Apodo (opcional)</label>
          <input type="text" id="cliente-apodo" placeholder="Ej: Juan Ferretero" />
        </div>
      </div>

      <!-- Tipo de Cliente -->
      <div class="form-group full-width">
        <label for="cliente-tipo">Tipo de Cliente *</label>
        <select id="cliente-tipo" required>
          <option value="">Seleccionar tipo...</option>
          <option value="GENERAL">General (Consumidor Final)</option>
          <option value="REGISTRADO">Registrado (Cliente Frecuente)</option>
          <option value="FISCAL">Fiscal (Empresa)</option>
        </select>
      </div>

      <!-- Contacto -->
      <div class="form-row">
        <div class="form-group">
          <label for="cliente-telefono">Teléfono</label>
          <input type="tel" id="cliente-telefono" placeholder="(+52) 123-456-7890" />
        </div>
        <div class="form-group">
          <label for="cliente-email">Email</label>
          <input type="email" id="cliente-email" placeholder="cliente@ejemplo.com" />
        </div>
      </div>

      <!-- RFC (todos los tipos) -->
      <div class="form-group full-width">
        <label for="cliente-rfc">RFC</label>
        <input type="text" id="cliente-rfc" placeholder="ABC123456XYZ" />
      </div>

      <!-- Campos dinámicos para FISCAL -->
      <div id="campos-fiscales" class="campos-dinamicos" style="display: none;">
        <hr class="divider" />
        <h4 class="seccion-titulo">Datos Fiscales (SAT)</h4>

        <div class="form-group full-width">
          <label for="cliente-razonSocial">Razón Social *</label>
          <input type="text" id="cliente-razonSocial" placeholder="Nombre legal exacto" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cliente-codigoPostalFiscal">Código Postal Fiscal</label>
            <input type="text" id="cliente-codigoPostalFiscal" placeholder="28001" />
          </div>
          <div class="form-group">
            <label for="cliente-regimenFiscal">Régimen Fiscal</label>
            <select id="cliente-regimenFiscal">
              <option value="">Seleccionar...</option>
              <option value="601">General de Ley (601)</option>
              <option value="605">Personas Morales (605)</option>
              <option value="606">Residentes en Extranjero (606)</option>
              <option value="607">Transparencia Fiscal (607)</option>
            </select>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="cliente-usoCfdi">Uso CFDI</label>
          <select id="cliente-usoCfdi">
            <option value="">Seleccionar...</option>
            <option value="G01">Adquisición de mercancías (G01)</option>
            <option value="G02">Devoluciones descuentos (G02)</option>
            <option value="G03">Gastos en general (G03)</option>
            <option value="P01">Por cuenta propia (P01)</option>
          </select>
        </div>
      </div>

      <!-- Crédito (REGISTRADO y FISCAL) -->
      <div id="campo-credito" class="campos-dinamicos" style="display: none;">
        <hr class="divider" />
        <h4 class="seccion-titulo">Límite de Crédito</h4>
        <div class="form-group full-width">
          <label for="cliente-limiteCredito">Límite de Crédito ($)</label>
          <input type="number" id="cliente-limiteCredito" step="0.01" min="0" placeholder="0.00" />
        </div>
      </div>

      <!-- Notas -->
      <div class="form-group full-width">
        <label for="cliente-notas">Notas</label>
        <textarea id="cliente-notas" rows="3" placeholder="Observaciones adicionales..."></textarea>
      </div>

      <!-- Error message -->
      <div id="cliente-error" class="error-message"></div>

      <!-- Botones -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar Cliente</button>
      </div>
    </form>
  </div>
</div>

<!-- ── MODAL HISTORIAL ── -->
<div id="modal-historial" class="modal">
  <div class="modal-content modal-large">
    <div class="modal-header">
      <h3 id="historial-title">Historial de Cliente</h3>
      <button class="modal-close" id="historial-close-btn">&times;</button>
    </div>

    <div class="historial-tabs">
      <button class="tab-button active" data-tab="ventas">Ventas</button>
      <button class="tab-button" data-tab="abonos">Abonos</button>
    </div>

    <div id="tab-ventas" class="tab-content active">
      <table class="historial-table">
        <thead>
          <tr>
            <th>Folio</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Método de Pago</th>
          </tr>
        </thead>
        <tbody id="ventas-tbody">
          <tr><td colspan="4" style="text-align: center; padding: 20px; color: var(--muted);">Sin ventas registradas</td></tr>
        </tbody>
      </table>
    </div>

    <div id="tab-abonos" class="tab-content">
      <table class="historial-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Monto</th>
            <th>Método</th>
            <th>Referencia</th>
          </tr>
        </thead>
        <tbody id="abonos-tbody">
          <tr><td colspan="4" style="text-align: center; padding: 20px; color: var(--muted);">Sin abonos registrados</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== SCRIPTS ===== -->
<!-- ORDEN CORRECTO: sidebar.js PRIMERO (maneja autenticación + sidebar) -->
<script src="sidebar.js"></script>

<!-- Luego: clientes.js (lógica de la página) -->
<script src="clientes.js"></script>

<!-- NOTA: NO llamar cargarSidebar() aquí -->
<!-- sidebar.js ya lo hace automáticamente en su DOMContentLoaded -->
<!-- El data-page="clientes" en <body> le dice qué página resaltar -->

</body>
</html>
